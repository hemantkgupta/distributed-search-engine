# Indexer Deployment — CDC consumer + GPU-batched embedder + segment
# builder. Stateless; backpressures CDC consumption on segment-build
# saturation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dse-indexer
  labels:
    app: dse-indexer
spec:
  replicas: 6
  selector:
    matchLabels:
      app: dse-indexer
  template:
    metadata:
      labels:
        app: dse-indexer
    spec:
      containers:
        - name: indexer
          image: hkg/dse-indexer:0.1.0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
            limits:
              memory: "48Gi"
              cpu: "16"
              nvidia.com/gpu: "1"
          env:
            - name: FLUSH_AT_DOC_COUNT
              value: "30000"
            - name: FLUSH_AT_BYTES
              value: "67108864"  # 64 MB
            - name: KAFKA_BOOTSTRAP
              value: "kafka.svc:9092"
            - name: KAFKA_TOPIC
              value: "docs.updated"
            - name: S3_BUCKET
              value: "dse-segments"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dse-indexer-tuning
data:
  hnsw-max-neighbours: "32"
  pq-m: "32"
  pq-k: "256"
  pq-codebook-version: "v1"
