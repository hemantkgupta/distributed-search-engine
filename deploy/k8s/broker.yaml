# Broker Deployment — stateless query coordinator.
#
# Scatter-gathers across shards with per-shard 80 ms hard cutoff,
# RRF-fuses across shards, emits partial results. Stateless = horizontal
# scaling on QPS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dse-broker
  labels:
    app: dse-broker
spec:
  replicas: 12
  selector:
    matchLabels:
      app: dse-broker
  template:
    metadata:
      labels:
        app: dse-broker
    spec:
      containers:
        - name: broker
          image: hkg/dse-broker:0.1.0
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 7080
          resources:
            requests:
              memory: "16Gi"
              cpu: "8"
            limits:
              memory: "32Gi"
              cpu: "16"
          env:
            - name: PER_SHARD_TIMEOUT_MS
              value: "80"
            - name: TIER1_SHARD_COUNT
              value: "1000"
            - name: JAVA_OPTS
              value: "-XX:+UseZGC -Xmx24g"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dse-broker
spec:
  type: ClusterIP
  selector:
    app: dse-broker
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dse-broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dse-broker
  minReplicas: 12
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
